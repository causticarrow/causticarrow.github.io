<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>causticarrow</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; background: #0a0f0a; color: #e0f0e0; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #253a25; }
    th { color: #88a888; font-size: 13px; text-transform: uppercase; }
    .positive { color: #4ade80; }
    .negative { color: #f87171; }
  </style>
</head>
<body>
  <h1>causticarrow</h1>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Play</th>
        <th>Result</th>
        <th>Units</th>
        <th>Score</th>
        <th>Close</th>
        <th>CLV</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    const PICKS = [
      {
        date: "2025-11-12",
        play: "Spirit ML (+162) vs. Falcons",
        result: "L",
        score: "0-2",
        close_odds: "+133"
      },
      {
        date: "2025-10-12",
        play: "Falcons PK (+128) vs. Vitality",
        result: "L",
        score: "5-13",
        close_odds: "+106"
      }
    ];

    function extractOdds(play) {
      const m = play.match(/\(([-+]?\d+)\)/);
      return m ? m[1] : null;
    }

    function americanToDecimal(a) {
      const num = parseInt(a);
      return num > 0 ? (num / 100) + 1 : (100 / -num) + 1;
    }

    function americanToProb(a) {
      return 1 / americanToDecimal(a);
    }

    function calculateUnits(oddsStr, result) {
      const a = parseInt(oddsStr);
      const risk = a > 0 ? 100 / a : -a / 100;
      return result === 'W' ? 1.0 : -risk;
    }

    function calculateCLV(myOdds, closeOdds) {
      const myDec = americanToDecimal(myOdds);
      const closeProb = americanToProb(closeOdds);
      const fairCloseProb = closeProb / 1.0476;
      const fairCloseDec = 1 / fairCloseProb;
      const clvDec = myDec - fairCloseDec;
      const clvPct = (fairCloseProb - (1 / myDec)) * 100;
      return { cents: clvDec * 100, pct: clvPct };
    }

    function formatCLV(cents, pct) {
      const sign = cents >= 0 ? '+' : '–';
      return `${sign}${Math.abs(cents).toFixed(2)}c (+${Math.abs(pct).toFixed(1)}%)`;
    }

    const tbody = document.getElementById('tableBody');
    const sorted = PICKS.sort((a, b) => new Date(b.date) - new Date(a.date));

    sorted.forEach(pick => {
      const myOdds = extractOdds(pick.play);
      if (!myOdds) return;

      const units = calculateUnits(myOdds, pick.result);
      const { cents, pct } = calculateCLV(myOdds, pick.close_odds);
      const unitsStr = (units >= 0 ? '+' : '') + units.toFixed(2);
      const clvStr = formatCLV(cents, pct);

      const row = `<tr>
        <td>${pick.date}</td>
        <td>${pick.play}</td>
        <td>${pick.result}</td>
        <td class="${units >= 0 ? 'positive' : 'negative'}">${unitsStr}</td>
        <td>${pick.score}</td>
        <td>${pick.close_odds}</td>
        <td class="${cents >= 0 ? 'positive' : 'negative'}">${clvStr}</td>
      </tr>`;
      tbody.innerHTML += row;
    });
  </script>
</body>
</html>
