<script>
  const PICKS = [
    {
      date: "2025-11-12",
      play: "Spirit ML (+162) vs. Falcons",
      result: "L",
      score: "0-2",
      close_odds: "+133"
    },
    {
      date: "2025-10-12",
      play: "Falcons PK (+128) vs. Vitality",
      result: "L",
      score: "5-13",
      close_odds: "+106"
    },
  ];

  function extractOdds(play) {
    const m = play.match(/\(([-+]?\d+)\)/);
    return m ? m[1] : null;
  }

  function americanToDecimal(a) {
    return a > 0 ? (a / 100) + 1 : (100 / -a) + 1;
  }

  function americanToProb(a) {
    return 1 / americanToDecimal(a);
  }

  function calculateUnits(oddsStr, result) {
    const a = parseInt(oddsStr);
    const risk = a > 0 ? 100 / a : -a / 100;
    return result === 'W' ? 1.0 : -risk;
  }

  function calculateCLV(myOdds, closeOdds) {
    const myProb = americanToProb(parseInt(myOdds));
    const closeProb = americanToProb(parseInt(closeOdds));
    const fairClose = closeProb / 1.0476;
    const clvProb = fairClose - myProb;
    return { cents: clvProb * 100, pct: clvProb * 100 };
  }

  function formatCLV(cents, pct) {
    const sign = cents >= 0 ? '+' : '–';
    const c = Math.abs(cents).toFixed(2);
    const p = Math.abs(pct).toFixed(1);
    return `${sign}${c}c (+${p}%)`.replace('+(–', '(–');
  }

  const sortedPicks = [...PICKS].sort((a, b) => new Date(b.date) - new Date(a.date));
  const tbody = document.getElementById('tableBody');
  const cumulative = [];
  let sumUnits = 0, totalClvCents = 0, wins = 0, losses = 0;

  sortedPicks.forEach(pick => {
    const myOdds = extractOdds(pick.play);
    if (!myOdds) return;

    const units = calculateUnits(myOdds, pick.result);
    sumUnits += units;
    cumulative.push({ x: pick.date, y: sumUnits });

    if (pick.result === 'W') wins++; else losses++;

    const { cents, pct } = calculateCLV(myOdds, pick.close_odds);
    totalClvCents += cents;

    const unitsStr = (units >= 0 ? '+' : '') + units.toFixed(2);
    const clvStr = formatCLV(cents, pct);

    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${pick.date}</td>
      <td class="play-col">${pick.play}</td>
      <td>${pick.result}</td>
      <td class="units-format ${units >= 0 ? 'positive' : 'negative'}">${unitsStr}</td>
      <td>${pick.score}</td>
      <td>${pick.close_odds}</td>
      <td class="clv-format ${cents >= 0 ? 'positive' : 'negative'}">${clvStr}</td>
    `;
    tbody.appendChild(row);
  });

  document.getElementById('totalUnits').textContent = (sumUnits >= 0 ? '+' : '') + sumUnits.toFixed(2);
  document.getElementById('record').textContent = `${wins}-${losses}`;
  document.getElementById('totalClv').textContent = (totalClvCents >= 0 ? '+' : '–') + Math.abs(totalClvCents).toFixed(2) + 'c';

  const ctx = document.getElementById('pnlChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        data: cumulative.map(p => ({ x: new Date(p.x), y: p.y })),
        borderColor: '#00ecc3',
        backgroundColor: 'rgba(0, 236, 195, 0.08)',
        borderWidth: 3,
        pointRadius: 0,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(20, 20, 20, 0.95)',
          titleColor: '#00ecc3',
          bodyColor: '#f0f0f0',
          borderColor: '#252525',
          borderWidth: 1,
          padding: 12
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'day', displayFormats: { day: 'MMM d' } },
          grid: { color: 'rgba(255,255,255,0.03)' },
          ticks: { color: '#888' }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.03)' },
          ticks: { color: '#888' }
        }
      }
    }
  });
</script>
