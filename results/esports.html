    // --- Formatting ---
    function stripTrailingZeros(numStr) {
      if (numStr.includes('.')) {
        numStr = numStr.replace(/\.?0+$/, '');
      }
      return numStr;
    }

    function parseDate(dateStr) {
      const [year, month, day] = dateStr.split('-').map(Number);
      return new Date(year, month - 1, day);
    }

    function formatDate(dateStr) {
      const [year, month, day] = dateStr.split('-').map(Number);
      return `${month}/${day}/${year.toString().slice(-2)}`;
    }

    function shortenMonthName(monthName) {
      // Only shorten on mobile
      if (window.innerWidth > 768) return monthName;

      const monthMap = {
        'January': 'Jan',
        'February': 'Feb',
        'March': 'Mar',
        'April': 'Apr',
        'May': 'May',
        'June': 'Jun',
        'July': 'Jul',
        'August': 'Aug',
        'September': 'Sep',
        'October': 'Oct',
        'November': 'Nov',
        'December': 'Dec'
      };

      return monthName.replace(/^(\w+)/, (match) => monthMap[match] || match);
    }

    function abbreviatePlay(play) {
      // Only abbreviate on mobile
      if (window.innerWidth > 768) return play;

      // For parlays on mobile, just show "Parlay"
      if (play.startsWith('Parlay (')) {
        return 'Parlay';
      }

      let abbreviated = play;

      // Remove " vs. OPPONENT" (everything after " vs." until a pill tag or end)
      abbreviated = abbreviated.replace(/\s+vs\.\s+([^<]+?)(?=\s*(?:<span|$))/g, '');

      // Esports team abbreviations (teams longer than 4 chars)
      const esportsTeams = {
        'Passion UA': 'PSUA',
        'Spirit': 'SPRT',
        'Falcons': 'FLCN',
        'Vitality': 'VITA'
      };

      for (const [full, abbr] of Object.entries(esportsTeams)) {
        abbreviated = abbreviated.replace(new RegExp(full, 'g'), abbr);
      }

      // Shorten pills: "Map X" to "MX", "Dota 2" to "D2"
      abbreviated = abbreviated.replace(/Map\s+(\d+)/g, 'M$1');
      abbreviated = abbreviated.replace(/Dota 2/g, 'D2');

      return abbreviated;
    }

    function formatGeneralNumber(num) {
      let s = num.toFixed(2);
      s = stripTrailingZeros(s);
      return s;
    }

    function formatWinPercent(num) {
      // On mobile: no decimals for monthly header
      if (window.innerWidth <= 768) {
        return Math.round(num).toString();
      }
      let s = num.toFixed(2);
      s = stripTrailingZeros(s);
      return s;
    }

    function formatUnits(num) {
      if (Math.abs(num - Math.round(num)) < 0.001) {
        return (num >= 0 ? '+' : '-') + Math.abs(num).toFixed(1);
      } else {
        let s = Math.abs(num).toFixed(2);
        s = stripTrailingZeros(s);
        return (num >= 0 ? '+' : '-') + s;
      }
    }

    function formatUnitsForHeader(num) {
      // On mobile: always 1 decimal for monthly header
      if (window.innerWidth <= 768) {
        return (num >= 0 ? '+' : '-') + Math.abs(num).toFixed(1);
      }
      return formatUnits(num);
    }

    function formatSignedNumber(num) {
      let s = Math.abs(num).toFixed(2);
      s = stripTrailingZeros(s);
      return (num >= 0 ? '+' : '-') + s;
    }

    function formatSignedPercent(num) {
      let s = Math.abs(num).toFixed(2);
      s = stripTrailingZeros(s);
      return (num >= 0 ? '+' : '-') + s + '%';
    }

    function formatROIForHeader(num) {
      // On mobile: no decimals for monthly header
      if (window.innerWidth <= 768) {
        const rounded = Math.round(num);
        return (rounded >= 0 ? '+' : '') + rounded + '%';
      }
      return formatSignedPercent(num);
    }

    function formatCLVPercentForHeader(num) {
      // On mobile: 1 decimal for monthly header
      if (window.innerWidth <= 768) {
        const val = num.toFixed(1);
        return (num >= 0 ? '+' : '') + val + '%';
      }
      return formatSignedPercent(num);
    }

    function formatCLV(cents, pct) {
      let cStr = Math.abs(cents).toFixed(1);
      cStr = stripTrailingZeros(cStr);
      let pStr = Math.abs(pct).toFixed(1);
      pStr = stripTrailingZeros(pStr);
      const cSign = cents >= 0 ? '+' : '-';
      const pSign = pct >= 0 ? '+' : '-';
      return `${cSign}${cStr}c (${pSign}${pStr}%)`;
    }

    function formatCLVForTable(cents, pct) {
      // On mobile: show only % with 1 decimal
      if (window.innerWidth <= 768) {
        const val = pct.toFixed(1);
        return (pct >= 0 ? '+' : '') + val + '%';
      }
      // Desktop: show full format
      return formatCLV(cents, pct);
    }

    // --- Math ---
    function calculateParlayOdds(parlayText) {
      const startPos = parlayText.indexOf('(');
      const endPos = parlayText.indexOf(')');

      if (startPos === -1 || endPos === -1) {
        return null;
      }

      const oddsString = parlayText.substring(startPos + 1, endPos);
      const legs = oddsString.split('/');

      if (legs.length < 2) {
        return null;
      }

      let decimalOdds = 1;

      for (let leg of legs) {
        leg = leg.trim();

        // Extract the last number (the odds) from the string
        const lastSpace = leg.lastIndexOf(' ');
        if (lastSpace > -1) {
          leg = leg.substring(lastSpace).trim();
        }

        const legOddsValue = parseFloat(leg);

        if (!isNaN(legOddsValue)) {
          if (legOddsValue > 0) {
            decimalOdds *= (1 + legOddsValue / 100);
          } else {
            decimalOdds *= (1 + 100 / Math.abs(legOddsValue));
          }
        }
      }

      let result;
      if (decimalOdds >= 2) {
        result = (decimalOdds - 1) * 100;
      } else {
        result = -100 / (decimalOdds - 1);
      }

      result = Math.round(result);

      // If odd and doesn't end in 5, round to nearest even
      if (Math.abs(result) % 2 !== 0 && Math.abs(result) % 10 !== 5) {
        if (result > 0) {
          result = result + 1;
        } else {
          result = result - 1;
        }
      }

      return result;
    }

    function americanToDecimal(a) {
      const n = parseInt(a);
      return n > 0 ? (n / 100) + 1 : (100 / -n) + 1;
    }

    function probToAmerican(prob) {
      return prob >= 0.5 ? -Math.round(100 * prob / (1 - prob)) : Math.round(100 * (1 - prob) / prob);
    }

    function solveForC(d1, d2) {
      let c = 1.0;
      for (let i = 0; i < 50; i++) {
        const p1 = Math.pow(1 / d1, c);
        const p2 = Math.pow(1 / d2, c);
        const f = p1 + p2 - 1;
        if (Math.abs(f) < 1e-10) break;
        const df = p1 * Math.log(1 / d1) + p2 * Math.log(1 / d2);
        if (Math.abs(df) < 1e-12) break;
        c = c - f / df;
      }
      return c;
    }

    function getOtherSide(closeOdds) {
      const close = parseInt(closeOdds);
      const p_close = close > 0 ? 100 / (close + 100) : -close / (-close + 100);
      const other_p = 1.0476 - p_close;
      return other_p >= 0.5 ? -Math.round(100 * other_p / (1 - other_p)) : Math.round(100 * (1 - other_p) / other_p);
    }

    function calculateFairProb(closeOdds) {
      const d1 = americanToDecimal(closeOdds);
      const d2 = americanToDecimal(getOtherSide(closeOdds));
      const c = solveForC(d1, d2);
      return Math.pow(1 / d1, c);
    }

    function calculateUnits(oddsStr, result) {
      if (result === 'Pending') return 0;
      const a = parseInt(oddsStr);
      const risk = a > 0 ? 100 / a : -a / 100;
      return result === 'W' ? 1.0 : -risk;
    }

    function calculateCLVAndXROI(myOdds, closeOdds) {
      const myDec = americanToDecimal(myOdds);
      const myProb = 1 / myDec;
      const fairProb = calculateFairProb(closeOdds);

      // Calculate CLV cents using proper formula
      let clvCents;
      if (myProb > 0.5 && fairProb <= 0.5) {
        const myOddsCalc = -100 * (myProb / (1 - myProb));
        const fairOddsCalc = 100 * ((1 - fairProb) / fairProb);
        clvCents = -((Math.abs(myOddsCalc) - 100) + (fairOddsCalc - 100));
      } else if (myProb <= 0.5 && fairProb > 0.5) {
        const myOddsCalc = 100 * ((1 - myProb) / myProb);
        const fairOddsCalc = -100 * (fairProb / (1 - fairProb));
        clvCents = (myOddsCalc - 100) + (Math.abs(fairOddsCalc) - 100);
      } else {
        const myOddsCalc = myProb > 0.5 ? -100 * (myProb / (1 - myProb)) : 100 * ((1 - myProb) / myProb);
        const fairOddsCalc = fairProb > 0.5 ? -100 * (fairProb / (1 - fairProb)) : 100 * ((1 - fairProb) / fairProb);
        clvCents = myOddsCalc - fairOddsCalc;
      }

      const clvPct = (fairProb - myProb) * 100;
      const xRoi = (fairProb * myDec - 1) * 100;
      return { cents: clvCents, pct: clvPct, xRoi: xRoi };
    }

    // --- Render on load ---
    window.addEventListener('load', () => {
      const container = document.getElementById('tablesContainer');
      let wins = 0, losses = 0, totalRisk = 0, totalUnits = 0, totalClvCents = 0, totalClvPct = 0, totalXROI = 0, totalClvCount = 0, totalXROICount = 0;

      // Arrays for chart data
      const chartDates = [];
      const chartCumulativeUnits = [];

      // Build chart data (chronological order, oldest first)
      // Add indices to maintain order for same-date picks
      const picksWithIndex = PICKS.map((pick, index) => ({ ...pick, originalIndex: index }));
      const chronologicalPicks = picksWithIndex.sort((a, b) => {
        const dateCompare = parseDate(a.date) - parseDate(b.date);
        // If dates are equal, higher index = older (since PICKS is newest-first), so put it first
        return dateCompare !== 0 ? dateCompare : b.originalIndex - a.originalIndex;
      });
      let cumulativeUnits = 0;
      chartDates.push('Start');
      chartCumulativeUnits.push(0);

      chronologicalPicks.forEach(pick => {
        let myOdds;
        if (pick.play.startsWith('Parlay (')) {
          myOdds = calculateParlayOdds(pick.play);
          if (myOdds) myOdds = myOdds.toString();
        } else {
          myOdds = pick.play.match(/\(([-+]?\d+)\)/)?.[1];
        }
        if (myOdds) {
          const units = calculateUnits(myOdds, pick.result);
          cumulativeUnits += units;
          chartDates.push(pick.date);
          chartCumulativeUnits.push(cumulativeUnits);
        }
      });

      // Sort picks for table display (newest first)
      const sortedPicks = [...PICKS].sort((a, b) => parseDate(b.date) - parseDate(a.date));
      const grouped = {};
      sortedPicks.forEach(pick => {
        const d = parseDate(pick.date);
        const displayKey = `${d.toLocaleString('default', { month: 'long' })} ${d.getFullYear()}`;
        if (!grouped[displayKey]) grouped[displayKey] = [];
        grouped[displayKey].push(pick);
      });

      // Process each month
      Object.keys(grouped).sort((a, b) => {
        const aDate = parseDate(grouped[a][0].date);
        const bDate = parseDate(grouped[b][0].date);
        return bDate - aDate;
      }).forEach(monthName => {
        const monthPicks = grouped[monthName];
        let monthWins = 0, monthLosses = 0, monthRisk = 0, monthUnits = 0, monthClvCents = 0, monthClvPctSum = 0, monthXROI = 0, monthClvCount = 0, monthXROICount = 0;

        const isMobileView = window.innerWidth <= 768;
        const clvHeaderLabel = isMobileView ? 'NV CLV' : 'No-Vig CLV';

        const table = document.createElement('table');
        table.innerHTML = `
          <thead>
            <tr>
              <th class="hdr-date">Date</th>
              <th class="hdr-play">Play</th>
              <th class="hdr-result">Result</th>
              <th class="hdr-units">Units</th>
              <th class="hdr-score">Score</th>
              <th class="hdr-close">Close</th>
              <th class="hdr-clv">${clvHeaderLabel}</th>
              <th class="hdr-xroi">Expected ROI</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;
        const tbody = table.querySelector('tbody');

        monthPicks.forEach(pick => {
          let myOdds;
          const isParlay = pick.play.startsWith('Parlay (');
          if (isParlay) {
            myOdds = calculateParlayOdds(pick.play);
            if (myOdds) myOdds = myOdds.toString();
          } else {
            myOdds = pick.play.match(/\(([-+]?\d+)\)/)?.[1];
          }
          if (!myOdds) return;

          const units = calculateUnits(myOdds, pick.result);
          const isPending = pick.result === 'Pending';
          const hasCloseOdds = pick.close_odds && pick.close_odds.trim() !== '';

          let cents = 0, pct = 0, xRoi = 0;
          if (hasCloseOdds) {
            const clvData = calculateCLVAndXROI(myOdds, pick.close_odds);
            cents = clvData.cents;
            pct = clvData.pct;
            xRoi = clvData.xRoi;

            // Only count CLV when close odds exist
            monthClvCents += cents;
            monthClvPctSum += pct;
            monthClvCount++;
            totalClvCents += cents;
            totalClvPct += pct;
            totalClvCount++;
          }

          // Only count risk, units, wins/losses, and xROI for non-pending bets
          if (!isPending) {
            const risk = parseInt(myOdds) > 0 ? 100 / parseInt(myOdds) : -parseInt(myOdds) / 100;
            monthUnits += units;
            totalUnits += units;
            monthRisk += risk;
            totalRisk += risk;

            if (pick.result === 'W') { monthWins++; wins++; } else { monthLosses++; losses++; }

            if (hasCloseOdds) {
              monthXROI += xRoi;
              monthXROICount++;
              totalXROI += xRoi;
              totalXROICount++;
            }
          }

          const unitsStr = isPending ? '' : formatUnits(units);
          const clvStr = hasCloseOdds ? formatCLVForTable(cents, pct) : '';
          const xRoiStr = hasCloseOdds ? formatSignedPercent(xRoi) : '';
          const resultText = isPending ? 'Pending' : (pick.result === 'W' ? 'Win' : 'Loss');
          const closeDisplay = hasCloseOdds ? (parseInt(pick.close_odds) >= 0 ? '+' + parseInt(pick.close_odds) : parseInt(pick.close_odds).toString()) : '';

          // Format play
          let formattedPlay = pick.play;
          // Remove number prefixes like "347 " or "416 "
          formattedPlay = formattedPlay.replace(/^\d+\s+/, '');
          // Strip any existing span tags from the data
          formattedPlay = formattedPlay.replace(/<\/?span[^>]*>/g, '');

          // Apply abbreviations on mobile FIRST (before HTML formatting)
          const isMobile = window.innerWidth <= 768;
          if (isMobile) {
            if (isParlay) {
              formattedPlay = 'Parlay';
            } else {
              // Remove " vs. OPPONENT" on mobile
              formattedPlay = formattedPlay.replace(/\s+vs\.\s+[^(]+(?=\s*$)/g, '');
            }
          }

          // Now add HTML formatting
          if (isParlay && !isMobile) {
            // Replace / FIRST, then odds numbers
            formattedPlay = formattedPlay.replace(/\//g, '<span class="vs-separator">/</span>');
            formattedPlay = formattedPlay.replace(/(?<![">])([+-]\d+)(?![^<]*<\/span>)/g, '<span class="bet-type">$1</span>');
          } else if (!isParlay) {
            // Color vs. with purple first
            if (!isMobile) {
              formattedPlay = formattedPlay.replace(/\s+vs\.\s+/g, ' <span class="vs-separator">vs.</span> ');
            }
            // Bold PK and odds together if they appear as "PK (odds)"
            formattedPlay = formattedPlay.replace(/\b(PK)\s+(\([+-]\d+\.?\d*\))/g, '<span class="bet-type">$1 $2</span>');
            // Bold Over/Under totals
            formattedPlay = formattedPlay.replace(/(Over|Under)\s+(\d+\.?\d*)/g, '<span class="bet-type">$1 $2</span>');
            // Bold any remaining standalone odds or spreads
            formattedPlay = formattedPlay.replace(/(?<![">])([+-]\d+\.?\d*)(?![^<]*<\/span>)/g, '<span class="bet-type">$1</span>');
          }

          if (pick.note) {
            formattedPlay += ` <span class="note-pill">${pick.note}</span>`;
          }
          if (pick.game) {
            const gameClass = pick.game.toLowerCase().replace(' ', '');
            formattedPlay += ` <span class="game-pill ${gameClass}">${pick.game}</span>`;
          }

          const row = document.createElement('tr');
          row.innerHTML = `
            <td class="col-date">${formatDate(pick.date)}</td>
            <td class="col-play"></td>
            <td class="col-result ${isPending ? '' : (pick.result === 'W' ? 'positive' : 'negative')}">${resultText}</td>
            <td class="col-units ${isPending ? '' : (units >= 0 ? 'positive' : 'negative')}">${unitsStr}</td>
            <td class="col-score">${pick.score}</td>
            <td class="col-close">${closeDisplay}</td>
            <td class="col-clv ${hasCloseOdds ? (cents >= 0 ? 'positive' : 'negative') : ''}">${clvStr}</td>
            <td class="col-xroi ${hasCloseOdds ? (xRoi >= 0 ? 'positive' : 'negative') : ''}">${xRoiStr}</td>
          `;
          row.querySelector('.col-play').innerHTML = formattedPlay;
          tbody.appendChild(row);
        });

        container.appendChild(table);

        // Monthly header
        const monthTotal = monthWins + monthLosses;
        const winPct = monthTotal ? ((monthWins / monthTotal) * 100) : 0;
        const roi = monthRisk ? ((monthUnits / monthRisk) * 100) : 0;
        const avgClvPct = monthClvCount ? monthClvPctSum / monthClvCount : 0;

        const header = document.createElement('h2');
        header.className = 'month-title';
        const isMobile = window.innerWidth <= 768;
        const clvLabel = isMobile ? 'NV CLV' : 'No-Vig CLV';
        header.innerHTML =
          `${shortenMonthName(monthName)}: ${monthWins}-${monthLosses} (${formatWinPercent(winPct)}%), ` +
          `<span class="${monthUnits >= 0 ? 'positive' : 'negative'}">${formatUnitsForHeader(monthUnits)}u</span>, ` +
          `<span class="${roi >= 0 ? 'positive' : 'negative'}">${formatROIForHeader(roi)} ROI</span>, ` +
          `<span class="${avgClvPct >= 0 ? 'positive' : 'negative'}">${formatCLVPercentForHeader(avgClvPct)} ${clvLabel}</span>`;
        container.insertBefore(header, table);
      });

      // Update top stats
      const totalPlays = wins + losses;
      const winPct = totalPlays ? ((wins / totalPlays) * 100) : 0;
      const roi = totalRisk ? ((totalUnits / totalRisk) * 100) : 0;
      const avgClvCents = totalClvCount ? totalClvCents / totalClvCount : 0;
      const avgClvPct = totalClvCount ? totalClvPct / totalClvCount : 0;
      const avgXROI = totalXROICount ? totalXROI / totalXROICount : 0;

      document.getElementById('totalPlays').textContent = `${totalPlays} (${wins}-${losses}, ${formatGeneralNumber(winPct)}%)`;
      document.getElementById('netRisk').textContent = formatGeneralNumber(totalRisk);
      document.getElementById('netProfit').textContent = formatSignedNumber(totalUnits);
      document.getElementById('netProfit').className = totalUnits >= 0 ? 'stat-value stat-positive' : 'stat-value stat-negative';
      document.getElementById('roi').textContent = formatSignedPercent(roi);
      document.getElementById('roi').className = roi >= 0 ? 'stat-value stat-positive' : 'stat-value stat-negative';
      document.getElementById('avgClv').textContent = formatCLV(avgClvCents, avgClvPct);
      document.getElementById('avgClv').className = avgClvCents >= 0 ? 'stat-value stat-positive' : 'stat-value stat-negative';
      document.getElementById('avgXROI').textContent = formatSignedPercent(avgXROI);
      document.getElementById('avgXROI').className = avgXROI >= 0 ? 'stat-value stat-positive' : 'stat-value stat-negative';

      // Update copy box
      const copyText = `record: ${wins}-${losses}, ${formatSignedNumber(totalUnits)}u, ${formatSignedPercent(avgClvPct)} no-vig clv // [archive](https://causticarrow.com/results/esports)`;
      const copyBox = document.getElementById('copyBox');
      copyBox.onclick = () => {
        navigator.clipboard.writeText(copyText).then(() => {
          copyBox.textContent = '✓';
          copyBox.style.borderColor = '#4ade80';
          copyBox.style.color = '#4ade80';
          setTimeout(() => {
            copyBox.textContent = '📋';
            copyBox.style.borderColor = '#2a2a2a';
            copyBox.style.color = '#e6e6e6';
          }, 1000);
        });
      };

      // Render chart
      const ctx = document.getElementById('profitChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: chartDates,
          datasets: [{
            label: 'Cumulative Profit (Units)',
            data: chartCumulativeUnits,
            borderColor: '#4ade80',
            backgroundColor: 'rgba(74, 222, 128, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.1,
            pointRadius: 3,
            pointHoverRadius: 5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: '#1a1a1a',
              titleColor: '#f0f0f0',
              bodyColor: '#e6e6e6',
              borderColor: '#2a2a2a',
              borderWidth: 1,
              padding: 12,
              displayColors: false,
              callbacks: {
                label: function(context) {
                  return 'Profit: ' + formatSignedNumber(context.parsed.y) + 'u';
                }
              }
            }
          },
          scales: {
            x: {
              display: false
            },
            y: {
              grid: {
                color: '#2a2a2a'
              },
              ticks: {
                color: '#999',
                callback: function(value) {
                  return (value >= 0 ? '+' : '') + value.toFixed(1) + 'u';
                }
              }
            }
          }
        }
      });
    });

// Sidebar auto-loader
async function populateSidebar() {
  const ul = document.getElementById("results-list");
  ul.innerHTML = "";

  try {
    const response = await fetch("results.json");
    const pages = await response.json();

    const currentPage = window.location.pathname.split("/").pop().replace('.html', '');

    pages.forEach((p) => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = p.file;
      a.textContent = p.label;

      if (p.file === currentPage) {
        a.classList.add("active");
      }

      li.appendChild(a);
      ul.appendChild(li);
    });
  } catch (err) {
    console.error("Could not load results.json", err);
  }
}

// Search filter
function filterSidebar() {
  var input, filter, ul, li, i;
  input = document.querySelector(".search-bar");
  filter = input.value.toUpperCase();
  ul = document.querySelector(".sidebar ul");
  li = ul.getElementsByTagName("li");

  for (i = 0; i < li.length; i++) {
    var a = li[i].getElementsByTagName("a")[0];
    if (a) {
      var txtValue = li[i].textContent || li[i].innerText;
      if (txtValue.toUpperCase().indexOf(filter) > -1) {
        li[i].style.display = "";
      } else {
        var shouldHide = true;
        li[i].querySelectorAll("*").forEach((node) => {
          if ((node.textContent || node.innerText).toUpperCase().indexOf(filter) > -1) {
            shouldHide = false;
          }
        });
        li[i].style.display = shouldHide ? "none" : "";
      }
    }
  }
}

// Initialize sidebar
populateSidebar();
document.querySelector(".search-bar").addEventListener("input", filterSidebar);
  </script>
