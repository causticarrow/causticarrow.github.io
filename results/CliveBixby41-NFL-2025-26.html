<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>causticarrow // 2025-26 NFL (@CliveBixby41)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #e6e6e6;
      padding: 32px;
      margin: 0;
      font-size: 15px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      font-weight: 600;
      font-size: 30px;
      color: #f0f0f0;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, auto));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-box {
      background: #161616;
      padding: 16px;
      border-radius: 10px;
      text-align: right;
    }
    .stat-label {
      font-size: 13px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: right;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 600;
      margin-top: 6px;
      color: #f0f0f0;
      text-align: right;
    }
    .stat-positive { color: #4ade80 !important; }
    .stat-negative { color: #f87171 !important; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #161616;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      margin-bottom: 16px;
    }
    th, td {
      padding: 12px 16px;
      font-weight: normal;
    }
    th {
      font-weight: 600;
      color: #aaa;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #1a1a1a;
    }
    .col-date { width: 165px; text-align: center; }
    .col-play { width: 496px; text-align: left; }
    .col-result { width: 113px; text-align: center; }
    .col-units { width: 113px; text-align: center; }
    .col-score { width: 113px; text-align: center; }
    .col-close { width: 145px; text-align: center; }
    .col-clv { width: 145px; text-align: center; }

    .hdr-date { width: 165px; text-align: center; }
    .hdr-play { width: 496px; text-align: left; }
    .hdr-result { width: 113px; text-align: center; }
    .hdr-units { width: 113px; text-align: center; }
    .hdr-score { width: 113px; text-align: center; }
    .hdr-close { width: 145px; text-align: center; }
    .hdr-clv { width: 145px; text-align: center; }

    .positive { color: #4ade80; }
    .negative { color: #f87171; }

    .bet-type {
      font-weight: 600;
      color: #f0f0f0;
    }

    .month-title {
      text-align: center;
      font-weight: 500;
      font-size: 16px;
      color: #f0f0f0;
      margin: 24px 0 12px;
      padding: 8px 16px;
      background: #1a1a1a;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>causticarrow // 2025-26 NFL (@CliveBixby41)</h1>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Total Plays</div>
        <div class="stat-value" id="totalPlays">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Net Risk</div>
        <div class="stat-value" id="netRisk">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Net Profit</div>
        <div class="stat-value" id="netProfit">+0.0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">ROI</div>
        <div class="stat-value" id="roi">+0.0%</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Avg CLV</div>
        <div class="stat-value" id="avgClv">+0.00%</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value" id="winRate">0.0%</div>
      </div>
    </div>

    <div style="width: 100%; height: 300px; margin-bottom: 32px; background: #161616; border-radius: 12px; padding: 20px; box-sizing: border-box;">
      <canvas id="profitChart"></canvas>
    </div>

    <div id="tablesContainer"></div>
  </div>

  <script>
    // --- DATA ---
    const PICKS = [
{ date: "2025-10-12", sport: "NFL", play: "Tennessee/Las Vegas Under 41.5", result: "Win", score: "10-20", close: "-114", clv: "+0.39%" },
{ date: "2025-10-12", sport: "NFL", play: "LA Chargers/Miami Under 45.5", result: "Loss", score: "29-27", close: "-114", clv: "-0.78%" },
{ date: "2025-10-09", sport: "NFL", play: "Philadelphia/NY Giants Under 42.5", result: "Loss", score: "17-34", close: "-140", clv: "+4.37%" },
{ date: "2025-10-05", sport: "NFL", play: "Washington/LA Chargers Under 48.5", result: "Win", score: "27-10", close: "-106", clv: "-3.73%" },
{ date: "2025-10-05", sport: "NFL", play: "Las Vegas/Indianapolis Under 48.5", result: "Win", score: "6-40", close: "-137", clv: "+3.83%" },
{ date: "2025-10-05", sport: "NFL", play: "Denver +5.5 vs. Philadelphia", result: "Win", score: "21-17", close: "-127", clv: "+2.4%" },
{ date: "2025-09-29", sport: "NFL", play: "NY Jets/Miami Over 43.5", result: "Win", score: "21-27", close: "-107", clv: "-3.49%" },
{ date: "2025-09-28", sport: "NFL", play: "Washington/Atlanta Under 45.5", result: "Loss", score: "27-34", close: "-130", clv: "+3.69%" },
{ date: "2025-09-28", sport: "NFL", play: "Carolina/New England Under 44", result: "Loss", score: "13-42", close: "-150", clv: "+6.06%" },
{ date: "2025-09-21", sport: "NFL", play: "Pittsburgh/New England Over 43.5", result: "Loss", score: "21-14", close: "-124.1", clv: "+1.36%" },
{ date: "2025-09-21", sport: "NFL", play: "New Orleans/Seattle Under 42.5", result: "Loss", score: "13-44", close: "-116.1", clv: "-0.31%" },
{ date: "2025-09-21", sport: "NFL", play: "Kansas City/NY Giants Over 42.5", result: "Loss", score: "22-9", close: "-137", clv: "+2.73%" },
{ date: "2025-09-21", sport: "NFL", play: "Dallas PK vs. Chicago", result: "Loss", score: "14-31", close: "-112", clv: "+0.41%" },
{ date: "2025-09-21", sport: "NFL", play: "Atlanta/Carolina Under 44.5", result: "Win", score: "0-35", close: "-122", clv: "+0.94%" },
{ date: "2025-09-15", sport: "NFL", play: "Tampa Bay/Houston Under 44.5", result: "Win", score: "20-19", close: "-146", clv: "+4.29%" },
{ date: "2025-09-15", sport: "NFL", play: "LA Chargers/Las Vegas Over 44.5", result: "Loss", score: "20-9", close: "-145", clv: "+4.13%" },
{ date: "2025-09-14", sport: "NFL", play: "New Orleans TT Under 18.5", result: "Loss", score: "21", close: "-101", clv: "-3.85%" }
    ];

    // --- Formatting ---
    function stripTrailingZeros(numStr) {
      if (numStr.includes('.')) {
        numStr = numStr.replace(/\.?0+$/, '');
      }
      return numStr;
    }

    function formatGeneralNumber(num) {
      let s = num.toFixed(2);
      s = stripTrailingZeros(s);
      return s;
    }

    function formatUnits(num) {
      if (Math.abs(num - Math.round(num)) < 0.001) {
        return (num >= 0 ? '+' : '-') + Math.abs(num).toFixed(1);
      } else {
        let s = Math.abs(num).toFixed(2);
        s = stripTrailingZeros(s);
        return (num >= 0 ? '+' : '-') + s;
      }
    }

    function formatSignedNumber(num) {
      let s = Math.abs(num).toFixed(2);
      s = stripTrailingZeros(s);
      return (num >= 0 ? '+' : '-') + s;
    }

    function formatSignedPercent(num) {
      let s = Math.abs(num).toFixed(2);
      s = stripTrailingZeros(s);
      return (num >= 0 ? '+' : '-') + s + '%';
    }

    // --- Units calculation ---
    function calculateUnits(closeOdds, result) {
      // Parse close odds, handling both formats (-110, +150, 125, etc.)
      let odds = parseFloat(closeOdds);

      // If positive odds don't have a +, assume positive if > 100
      if (odds > 100 && !closeOdds.includes('-')) {
        odds = odds;
      }

      if (result === 'Win') {
        return 1.0;
      } else {
        // Calculate risk based on odds
        if (odds >= 0) {
          // Positive odds: risk less to win 1 unit
          return -(100 / odds);
        } else {
          // Negative odds: risk more to win 1 unit
          return -(-odds / 100);
        }
      }
    }

    // --- Render on load ---
    window.addEventListener('load', () => {
      const container = document.getElementById('tablesContainer');
      let wins = 0, losses = 0, totalRisk = 0, totalUnits = 0, totalClv = 0;

      // Arrays for chart data
      const chartDates = [];
      const chartCumulativeUnits = [];

      // Build chart data (chronological order, oldest first)
      const chronologicalPicks = [...PICKS].sort((a, b) => new Date(a.date) - new Date(b.date));
      let cumulativeUnits = 0;
      chartDates.push('Start');
      chartCumulativeUnits.push(0);

      chronologicalPicks.forEach(pick => {
        const units = calculateUnits(pick.close, pick.result);
        cumulativeUnits += units;
        chartDates.push(pick.date);
        chartCumulativeUnits.push(cumulativeUnits);
      });

      // Sort picks for table display (newest first)
      const sortedPicks = [...PICKS].sort((a, b) => new Date(b.date) - new Date(a.date));
      const grouped = {};
      sortedPicks.forEach(pick => {
        const d = new Date(pick.date);
        const displayKey = `${d.toLocaleString('default', { month: 'long' })} ${d.getFullYear()}`;
        if (!grouped[displayKey]) grouped[displayKey] = [];
        grouped[displayKey].push(pick);
      });

      // Process each month
      Object.keys(grouped).sort((a, b) => {
        const aDate = new Date(grouped[a][0].date);
        const bDate = new Date(grouped[b][0].date);
        return bDate - aDate;
      }).forEach(monthName => {
        const monthPicks = grouped[monthName];
        let monthWins = 0, monthLosses = 0, monthRisk = 0, monthUnits = 0, monthClv = 0;

        const table = document.createElement('table');
        table.innerHTML = `
          <thead>
            <tr>
              <th class="hdr-date">Date</th>
              <th class="hdr-play">Play</th>
              <th class="hdr-result">Result</th>
              <th class="hdr-units">Units</th>
              <th class="hdr-score">Score</th>
              <th class="hdr-close">Close</th>
              <th class="hdr-clv">CLV</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;
        const tbody = table.querySelector('tbody');

        monthPicks.forEach(pick => {
          const units = calculateUnits(pick.close, pick.result);
          const risk = units < 0 ? -units : 1;

          monthUnits += units;
          totalUnits += units;
          monthRisk += risk;
          totalRisk += risk;

          if (pick.result === 'Win') { monthWins++; wins++; } else { monthLosses++; losses++; }

          // Parse CLV
          const clvValue = parseFloat(pick.clv.replace('%', ''));
          monthClv += clvValue;
          totalClv += clvValue;

          const unitsStr = formatUnits(units);
          const clvStr = pick.clv;
          const resultText = pick.result === 'Win' ? 'Win' : 'Loss';

          // Format play - highlight spreads, totals, and team names
          let formattedPlay = pick.play;
          // Highlight spread numbers like -2.5, +3.5
          formattedPlay = formattedPlay.replace(/([+-]\d+\.?\d*)/g, '<span class="bet-type">$1</span>');
          // Highlight Over/Under
          formattedPlay = formattedPlay.replace(/(Over|Under)/g, '<span class="bet-type">$1</span>');
          // Highlight PK
          formattedPlay = formattedPlay.replace(/\bPK\b/g, '<span class="bet-type">PK</span>');

          const row = document.createElement('tr');
          row.innerHTML = `
            <td class="col-date">${pick.date}</td>
            <td class="col-play">${formattedPlay}</td>
            <td class="col-result ${pick.result === 'Win' ? 'positive' : 'negative'}">${resultText}</td>
            <td class="col-units ${units >= 0 ? 'positive' : 'negative'}">${unitsStr}</td>
            <td class="col-score">${pick.score}</td>
            <td class="col-close">${pick.close}</td>
            <td class="col-clv ${clvValue >= 0 ? 'positive' : 'negative'}">${clvStr}</td>
          `;
          tbody.appendChild(row);
        });

        container.appendChild(table);

        // Monthly header
        const monthTotal = monthWins + monthLosses;
        const winPct = monthTotal ? ((monthWins / monthTotal) * 100) : 0;
        const roi = monthRisk ? ((monthUnits / monthRisk) * 100) : 0;
        const avgClv = monthTotal ? monthClv / monthTotal : 0;

        const header = document.createElement('h2');
        header.className = 'month-title';
        header.innerHTML =
          `${monthName}: ${monthWins}-${monthLosses} (${formatGeneralNumber(winPct)}%), ` +
          `<span class="${monthUnits >= 0 ? 'positive' : 'negative'}">${formatUnits(monthUnits)}u</span>, ` +
          `<span class="${roi >= 0 ? 'positive' : 'negative'}">${formatSignedPercent(roi)} ROI</span>, ` +
          `<span class="${avgClv >= 0 ? 'positive' : 'negative'}">${formatSignedPercent(avgClv)} CLV</span>`;
        container.insertBefore(header, table);
      });

      // Update top stats
      const totalPlays = wins + losses;
      const winPct = totalPlays ? ((wins / totalPlays) * 100) : 0;
      const roi = totalRisk ? ((totalUnits / totalRisk) * 100) : 0;
      const avgClv = totalPlays ? totalClv / totalPlays : 0;

      document.getElementById('totalPlays').textContent = `${totalPlays} (${wins}-${losses}, ${formatGeneralNumber(winPct)}%)`;
      document.getElementById('netRisk').textContent = formatGeneralNumber(totalRisk);
      document.getElementById('netProfit').textContent = formatSignedNumber(totalUnits);
      document.getElementById('netProfit').className = totalUnits >= 0 ? 'stat-value stat-positive' : 'stat-value stat-negative';
      document.getElementById('roi').textContent = formatSignedPercent(roi);
      document.getElementById('roi').className = roi >= 0 ? 'stat-value stat-positive' : 'stat-value stat-negative';
      document.getElementById('avgClv').textContent = formatSignedPercent(avgClv);
      document.getElementById('avgClv').className = avgClv >= 0 ? 'stat-value stat-positive' : 'stat-value stat-negative';
      document.getElementById('winRate').textContent = formatGeneralNumber(winPct) + '%';
      document.getElementById('winRate').className = winPct >= 50 ? 'stat-value stat-positive' : 'stat-value stat-negative';

      // Render chart
      const ctx = document.getElementById('profitChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: chartDates,
          datasets: [{
            label: 'Cumulative Profit (Units)',
            data: chartCumulativeUnits,
            borderColor: '#4ade80',
            backgroundColor: 'rgba(74, 222, 128, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.1,
            pointRadius: 3,
            pointHoverRadius: 5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: '#1a1a1a',
              titleColor: '#f0f0f0',
              bodyColor: '#e6e6e6',
              borderColor: '#2a2a2a',
              borderWidth: 1,
              padding: 12,
              displayColors: false,
              callbacks: {
                label: function(context) {
                  return 'Profit: ' + formatSignedNumber(context.parsed.y) + 'u';
                }
              }
            }
          },
          scales: {
            x: {
              grid: {
                color: '#2a2a2a'
              },
              ticks: {
                color: '#999',
                maxRotation: 45,
                minRotation: 45
              }
            },
            y: {
              grid: {
                color: '#2a2a2a'
              },
              ticks: {
                color: '#999',
                callback: function(value) {
                  return (value >= 0 ? '+' : '') + value.toFixed(1) + 'u';
                }
              }
            }
          }
        }
      });
    });
  </script>
</body>
</html>
