function detectResult(play, score, odds) {
  if (!score) return "pending";
  const parts = score.split("-").map(Number);
  if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return "pending";
  let s1 = parts[0], s2 = parts[1];
  const hcap = play.match(/\s([+-]\d+\.?\d*)\s+vs\./);
  if (hcap && !/\bPK\b/.test(play)) s1 += parseFloat(hcap[1]);
  if (s1 > s2) return "won";
  if (s1 < s2) return "lost";
  return "push";
}

function calcRiskUnits(odds, isExtra) {
  const base = isExtra ? 0.5 : 1.0;
  return odds > 0 ? base * 100 / odds : base * Math.abs(odds) / 100;
}

  return {
    date: p.date,
    tournament: p.tournament,
    play: p.play,
    odds: p.odds,
    result,
    game: p.game || null,
    isExtra,
    unitSize: UNIT_SIZE,
    risk: riskUnits,
  };
});

function fmtAmerican(odds) { return odds >= 0 ? "+" + odds : "" + odds; }

function oddsImpliedProb(odds) {
  const p = odds >= 0 ? 100 / (odds + 100) : Math.abs(odds) / (Math.abs(odds) + 100);
  return stripTrailing((p * 100).toFixed(2));
}
function fmtOddsWithProb(odds) { return fmtAmerican(odds) + " (" + oddsImpliedProb(odds) + "%)"; }

function avgAmericanOddsWithProb(bets) {
  if (!bets.length) return "N/A";
  const probs = bets.map(b => b.odds >= 0 ? 100 / (b.odds + 100) : Math.abs(b.odds) / (Math.abs(b.odds) + 100));
  const avg = probs.reduce((s, v) => s + v, 0) / probs.length;
  const raw = avg >= 0.5 ? avg / (1 - avg) * 100 : (1 - avg) / avg * 100;
  return (avg >= 0.5 ? "-" : "+") + parseFloat(raw.toFixed(1)) + " (" + stripTrailing((avg * 100).toFixed(2)) + "%)";
}

  if (result === "pending") return null;
  if (result === "lost") return -riskUnits;
  if (result === "push") return 0;
  return odds >= 0 ? riskUnits * (odds / 100) : riskUnits * (100 / Math.abs(odds));
}

function normCDF(z) {
  const x = Math.abs(z) / Math.SQRT2;
  const t = 1 / (1 + 0.3275911 * x);
  const erfc = t * (0.254829592 + t * (-0.284496736 + t * (1.421413741 + t * (-1.453152027 + t * 1.061405429)))) * Math.exp(-x * x);
  return z >= 0 ? 1 - 0.5 * erfc : 0.5 * erfc;
}

function calcPValue(bets) {
  if (bets.length < 2) return null;
  const n = bets.length;
  const returns = bets.map(b => {
    const d = b.odds>=0 ? b.odds/100+1 : 1+100/Math.abs(b.odds);
    return b.result==='won' ? d-1 : b.result==='lost' ? -1 : 0;
  });
  const meanReturn = returns.reduce((s,r)=>s+r,0)/n;

  const varSum = bets.reduce((s,b) => {
    const d = b.odds>=0 ? b.odds/100+1 : 1+100/Math.abs(b.odds);
    const p = 1/d;
    return s + p*(d-1)*(d-1) + (1-p);
  }, 0);
  const sigma = Math.sqrt(varSum/n);
  if (sigma <= 0) return null;
  const z = (meanReturn - (-0.0455)) / (sigma / Math.sqrt(n));
  return 1 - normCDF(z);
}

  : yearStart + "-" + String(yearEnd).slice(2);

const equityLabels = ["0"];
const equityData = [0];
const equityPlays = [""];
let runningU = 0;
closed.forEach((b,i) => {
  runningU += pnls[i];
  equityLabels.push(String(i+1));
  equityData.push(runningU);
  equityPlays.push(fmtPlayWithOdds(b.play, b.odds));
});

const shortMonths = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const monthBoundaries = [];
let lastMonth = null;
closed.forEach((b,i) => {
  const [year, month] = b.date.split("-");
  const key = year+"-"+month;
  if(key!==lastMonth) { monthBoundaries.push({index:i+1, label:shortMonths[parseInt(month)-1]+" "+year}); lastMonth=key; }
});

const athData = [0];
let ath = 0;
for(let i=1; i<equityData.length; i++) {
  if(equityData[i]>ath) ath=equityData[i];
  athData.push(ath);
}

const GAME_COLORS = { CS2: "rgb(56, 208, 240)", VAL: "rgb(208, 112, 248)" };
const GAME_LABEL_TEXT = { CS2: "#5ec8dc", VAL: "#e898f0" };

const gameSeries = {};
const gameCum2 = {};
const firstGameIdx = {};
closed.forEach((b, i) => {
  const g = b.game;
  if (g && GAME_COLORS[g] && !(g in firstGameIdx)) firstGameIdx[g] = i;
});
Object.keys(firstGameIdx).forEach(g => {
  gameCum2[g] = 0;
  gameSeries[g] = [];
});

for (let i = 0; i <= closed.length; i++) {
  Object.keys(firstGameIdx).forEach(g => {
    if (i < firstGameIdx[g]) {
      gameSeries[g].push(null);
    } else if (i === firstGameIdx[g]) {
      gameSeries[g].push(0);
    } else {
      gameSeries[g].push(gameCum2[g]);
    }
  });

  if (i < closed.length) {
    const b = closed[i];
    const g = b.game;
    if (g && gameCum2[g] !== undefined) gameCum2[g] += pnls[i];
  }
}

const betClasses = { pk:{wins:0,losses:0,pnl:0,risk:0}, hcap:{wins:0,losses:0,pnl:0,risk:0}, sides:{wins:0,losses:0,pnl:0,risk:0}, extras:{wins:0,losses:0,pnl:0,risk:0}, fav:{wins:0,losses:0,pnl:0,risk:0}, dog:{wins:0,losses:0,pnl:0,risk:0} };
closed.forEach((b,i) => {
  const pnl = pnls[i];
  const isPK = /\bPK\b/.test(b.play);
  const hcapMatch = b.play.match(/([+-]\d+\.?\d*)\s+vs\./);
  const isHcap = !!hcapMatch && !isPK;
  function acc(key) { betClasses[key].pnl+=pnl; betClasses[key].risk+=b.risk; if(b.result==="won") betClasses[key].wins++; else betClasses[key].losses++; }
  if(isPK) acc("pk"); else if(isHcap) acc("hcap");
  if(b.isExtra) acc("extras");
  else if(isPK || isHcap) acc("sides");
  let isFav, isDog;
  if(isHcap) { isFav=hcapMatch[1].startsWith("-"); isDog=hcapMatch[1].startsWith("+"); }
  else { isFav=b.odds<0; isDog=b.odds>0; }
  if(isFav) acc("fav"); else if(isDog) acc("dog");
});
Object.values(betClasses).forEach(d => {
  const nn=d.wins+d.losses;
  const aw=nn>0?(1.1*nn+d.pnl)/2.1:0;
  d.adjWins=aw; d.adjLosses=Math.max(nn-aw,0);
});

const tournMap = {};
closed.forEach((b,i) => {
  const key = b.tournament+"|"+b.date.slice(0,4);
  if(!tournMap[key]) tournMap[key]={wins:0,losses:0,pnlUnits:0};
  tournMap[key].pnlUnits+=pnls[i];
  if(b.result==="won") tournMap[key].wins++; else tournMap[key].losses++;
});
const allTournStats = TOURNAMENT_ORDER.filter(t=>tournMap[t]).map(t=>{
  const d = tournMap[t];
  const n = d.wins + d.losses;
  const aw = n > 0 ? (1.1 * n + d.pnlUnits) / 2.1 : 0;
  return { tournament: tournDisplayName(t), ...d, adjWins: Math.round(aw), adjLosses: Math.round(Math.max(n - aw, 0)) };
});

let tournPage = 0;
const TOURN_PAGE_SIZE = 5;
const totalTournPages = Math.ceil(allTournStats.length/TOURN_PAGE_SIZE);

function getPickTeam(play) {
  if (/\bOver\b|\bUnder\b/.test(play) && play.includes("/")) return null;
  const match = play.match(/^(.+?)\s+(PK|[+-]\d)/);
  return match ? match[1].trim() : null;
}

function shortenPlay(play) {
  const m = play.match(/^(.+?)\s+(PK|[+-]\d[\d.]*)\s+vs\..+$/);
  if (!m) return play;
  const team = m[1].trim();
  const line = m[2];
  return line === "PK" ? team + " PK" : team + " " + line;
}

function gameClass(game) {
  if(!game) return "";
  const g = game.toLowerCase();
  if(g==="cs2") return "cs2";
  if(g==="val") return "val";
  return "";
}

function copyRecord() {
  const btn = document.querySelector(".copy-record-btn");
  const w = Math.round(adjWins), l = Math.round(adjLosses);
  const pnlStr = fmtUnit(totalPnlUnits, true);
  const text = `${seasonLabel} record: ${w}-${l}, ${pnlStr} // [archive](https://causticarrow.com)`;
  navigator.clipboard.writeText(text).then(() => {
    if (btn) { btn.textContent = "Copied!"; btn.classList.add("copied"); setTimeout(() => { btn.textContent = "Copy Record"; btn.classList.remove("copied"); }, 2000); }
  }).catch(() => {
    if (btn) { btn.textContent = "Failed"; setTimeout(() => { btn.textContent = "Copy Record"; }, 2000); }
  });
}

function buildStatsSubHTML() {
  function item(label, cls) {
    const d=betClasses[cls];
    const pnlStr=fmtUnit(d.pnl,true);
    const pnlColor=d.pnl>=0?"var(--green)":"var(--red)";
    return `<div class="stats-sub-item">
      <span class="stats-sub-label">${label}</span>
      <span class="stats-sub-record">${Math.round(d.adjWins)}-${Math.round(d.adjLosses)}</span>
      <span class="stats-sub-pnl" style="color:${pnlColor}">${pnlStr}</span>
    </div>`;
  }
  const pkN=betClasses.pk.wins+betClasses.pk.losses;
  const hcapN=betClasses.hcap.wins+betClasses.hcap.losses;
  const favN=betClasses.fav.wins+betClasses.fav.losses;
  const dogN=betClasses.dog.wins+betClasses.dog.losses;
  const typeTotal=pkN+hcapN;
  const sideTotal=favN+dogN;
  const pkPct=typeTotal>0?pkN/typeTotal*100:50;
  const favPct=sideTotal>0?favN/sideTotal*100:50;
  function splitRow(labelA,countA,pctA,labelB,countB) {
    return `<div class="split-row">
      <span class="split-count">${labelA} <span style="color:var(--text-secondary)">${pctA.toFixed(0)}%</span></span>
      <div class="split-track">
        <div class="split-a" style="width:${pctA.toFixed(1)}%"></div>
        <div class="split-b" style="width:${(100-pctA).toFixed(1)}%"></div>
      </div>
      <span class="split-count split-count-right"><span style="color:var(--text-secondary)">${(100-pctA).toFixed(0)}%</span> ${labelB}</span>
    </div>`;
  }
  const extrasN=betClasses.extras.wins+betClasses.extras.losses;
  return `<div class="stats-sub">
    ${item("Sides","sides")}
    ${extrasN>0?item("Extras","extras"):""}
    ${item("Favourites","fav")}
    ${item("Dogs","dog")}
  </div>
  <div class="stats-split">
    ${splitRow("PK",pkN,pkPct,"HC",hcapN)}
    ${splitRow("Fav",favN,favPct,"Dog",dogN)}
  </div>`;
}

function buildBetTableHTML() {
  const ddVisible = displayBets.filter(b => ddBets.has(b));
  const ddFirst = ddVisible.length ? ddVisible[0] : null;
  const ddLast = ddVisible.length ? ddVisible[ddVisible.length - 1] : null;
  return displayBets.map(b => {
    const resultClass = b.result==="won"?"result-won":b.result==="lost"?"result-lost":b.result==="push"?"result-push":"result-pending";
    const resultFull = b.result==="won"?"Win":b.result==="lost"?"Loss":b.result==="push"?"Push":"Pending";
    const resultShort = b.result==="won"?"W":b.result==="lost"?"L":b.result==="push"?"P":"—";
    const pick = getPickTeam(b.play);
    const logoHTML = playLogoImgHTML(pick);
    const gc = b.game ? gameClass(b.game) : "";
    const pillHTML = gc ? `<span class="game-pill ${gc}">${b.game}</span>` : "";
    const inDD = ddBets.has(b);
    const ddCls = inDD ? `dd-row${b === ddFirst ? " dd-top" : ""}${b === ddLast ? " dd-bottom" : ""}` : "";
    return `<tr${ddCls ? ` class="${ddCls}"` : ""}>
      <td class="col-num" style="color:var(--text-muted)">${betNums.get(b)}</td>
      <td class="col-date">${fmtDate(b.date)}</td>
      <td class="col-game">${pillHTML}</td>
      <td class="col-tourn">${b.tournament}</td>
      <td class="col-play" style="color:var(--text-primary)"><span class="play-cell">${logoHTML}<span class="play-cell-text"><span class="play-full">${b.play}</span><span class="play-short">${shortenPlay(b.play)}</span>${b.isExtra?'<span class="extra-pill">EXTRA</span>':""}</span></span></td>
      <td class="col-odds"><span class="odds-full">${fmtOddsWithProb(b.odds)}</span><span class="odds-short">${fmtAmerican(b.odds)}</span></td>
      <td class="col-risk">${fmtUnitRisk(b.risk)}</td>
      <td class="col-result"><span class="result-badge ${resultClass} result-full">${resultFull}</span><span class="result-badge ${resultClass} result-short">${resultShort}</span></td>
    </tr>`;
  }).join("");
}

function buildTournRowsHTML(page) {
  return allTournStats.slice(page*TOURN_PAGE_SIZE,(page+1)*TOURN_PAGE_SIZE).map(c => {
    return `<div class="cat-row">
      <span class="cat-badge">${c.tournament}</span>
      <span class="cat-pnl" style="color:${c.pnlUnits>0?"var(--green)":c.pnlUnits<0?"var(--red)":"var(--text-muted)"}">${c.adjWins}-${c.adjLosses}, ${fmtUnit(c.pnlUnits,true)}</span>
    </div>`;
  }).join("");
}

function buildTournPaginationHTML(page) {
  if(totalTournPages<=1) return "";
  let btns="";
  for(let i=0;i<totalTournPages;i++) btns+=`<button class="page-btn ${i===page?"active":""}" onclick="goToTournPage(${i})">${i+1}</button>`;
  return `<div class="pagination">
    <button class="page-btn" onclick="goToTournPage(${page-1})" ${page===0?"disabled":""}>◄</button>
    ${btns}
    <button class="page-btn" onclick="goToTournPage(${page+1})" ${page>=totalTournPages-1?"disabled":""}>►</button>
  </div>`;
}

function goToTournPage(p) {
  if(p<0||p>=totalTournPages) return;
  tournPage=p;
  document.getElementById("tournRows").innerHTML=buildTournRowsHTML(tournPage);
  document.getElementById("tournPaginationWrap").innerHTML=buildTournPaginationHTML(tournPage);
  requestAnimationFrame(resizeSeq);
}

function buildSeqHTML(count) {
  return displayBets.slice(0,count).map(b => {
    const cls=b.result==="won"?"seq-won":b.result==="lost"?"seq-lost":b.result==="push"?"seq-push":"seq-pending";
    const lbl=b.result==="won"?"Win":b.result==="lost"?"Loss":b.result==="push"?"Push":"Pending";
    return `<div class="seq-block ${cls}" title="#${betNums.get(b)} · ${fmtPlayWithOdds(b.play,b.odds)} · ${lbl}"></div>`;
  }).join("");
}

function snapTableRows() {
  const scroll = document.querySelector('.table-body-scroll');
  if (!scroll) return;
  const card = scroll.closest('.card');
  scroll.style.maxHeight = '';
  if (card) card.style.maxHeight = '';
  if (window.matchMedia("(max-width: 768px)").matches) {
    scroll.style.scrollPaddingTop = "";
    updateDDOverlay();
    return;
  }
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const bodyRows = scroll.querySelectorAll('tbody tr');
    if (!bodyRows.length) return;
    const thead = scroll.querySelector('thead tr');
    const theadH = thead ? thead.offsetHeight : 0;
    scroll.style.scrollPaddingTop = theadH + 'px';
    const targetRow = bodyRows[Math.min(11, bodyRows.length) - 1];
    const scrollTop = scroll.getBoundingClientRect().top;
    const rowBottom = targetRow.getBoundingClientRect().bottom;
    const bleedPx = 8;
    scroll.style.maxHeight = (rowBottom - scrollTop - bleedPx) + 'px';
    if (card) card.style.maxHeight = (rowBottom - card.getBoundingClientRect().top + 1 - bleedPx) + 'px';
    updateDDOverlay();
  }));
}

function updateDDOverlay() {
  const scroll = document.querySelector('.table-body-scroll');
  if (!scroll) return;
  const topRow = scroll.querySelector('tr.dd-top');
  const bottomRow = scroll.querySelector('tr.dd-bottom');
  let overlay = document.getElementById('dd-overlay');
  if (!topRow || !bottomRow) {
    if (overlay) overlay.style.display = 'none';
    return;
  }
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'dd-overlay';
    overlay.style.cssText = "position:absolute;pointer-events:none;border:1px solid " + PAL.r(0.35) + ";z-index:1;box-sizing:border-box;left:0;right:0;";
    scroll.appendChild(overlay);
  }
  overlay.style.display = 'block';
  const scrollRect = scroll.getBoundingClientRect();
  const topRect = topRow.getBoundingClientRect();
  const bottomRect = bottomRow.getBoundingClientRect();
  overlay.style.top = (topRect.top - scrollRect.top + scroll.scrollTop) + 'px';
  overlay.style.height = (bottomRect.bottom - topRect.top) + 'px';
}

function resizeSeq() {
  const seqWrap=document.getElementById("seqWrap");
  const seqLbl=document.getElementById("seqLabel");
  if(!seqWrap) return;
  const availH=seqWrap.clientHeight-20;
  const blockSize=(seqWrap.clientWidth-28-36)/10;
  const rows=Math.max(1,Math.floor((availH+4)/(blockSize+4)));
  const count=Math.min(rows*10,totalTournPages<=1?100:displayBets.length);
  seqWrap.innerHTML=buildSeqHTML(count);
  if(seqLbl) seqLbl.textContent="Last "+count;
}

          enabled: false,
          external: function(context) {
            const tooltipEl = document.getElementById("chartTooltip");
            const tooltipModel = context.tooltip;
            if(tooltipModel.opacity===0) { tooltipEl.style.opacity="0"; return; }
            const idx = tooltipModel.dataPoints?.[0]?.dataIndex;
            if(idx===undefined) return;
            const val = equityData[idx];
            const playText = idx===0 ? "Start" : (equityPlays[idx]||"Play #"+idx);
            const valColor = val===0?PAL.tick:val>0?PAL.green:PAL.red;
            const valText = val===0?fmtUnit(0):fmtUnit(val,true);

            let gameLines = "";
            Object.entries(GAME_COLORS).filter(([g]) => gameSeries[g]).forEach(([g, col]) => {
              const gv = gameSeries[g][idx];
              if (gv === null || gv === undefined) return;
              const gColor = gv === 0 ? PAL.tick : GAME_LABEL_TEXT[g] || col;
              gameLines += `<div style="font-size:11px;font-weight:600;color:${gColor};margin-top:2px">${g}: ${fmtUnit(gv,true)}</div>`;
            });
            tooltipEl.innerHTML=`<div class="chart-tooltip-play">${playText}</div><div class="chart-tooltip-value" style="color:${valColor}">${valText}</div>${gameLines}`;
            const chartArea=context.chart.chartArea;
            const tipWidth=tooltipEl.offsetWidth, tipHeight=tooltipEl.offsetHeight;
            let left=tooltipModel.caretX+12;
            if(left+tipWidth>chartArea.right+18) left=tooltipModel.caretX-tipWidth-12;
            let top=tooltipModel.caretY-tipHeight/2;
            if(top<chartArea.top) top=chartArea.top;
            if(top+tipHeight>chartArea.bottom) top=chartArea.bottom-tipHeight;
            tooltipEl.style.opacity="1";
            tooltipEl.style.left=left+"px";
            tooltipEl.style.top=top+"px";
          }
        }
      },
      scales: {
        x: { grid:{display:false}, ticks:{color:PAL.tick,font:{family:"Inter",size:10}}, border:{display:false} },
        y: { position:"right", grid:{color:PAL.grid,lineWidth:1}, ticks:{color:PAL.tick,font:{family:"Inter",size:10},callback:v=>fmtUnit(v),padding:6}, border:{display:false} }
      }
    },
    plugins: [{
      beforeDatasetsDraw(chart) {
        const {ctx,chartArea,scales:{y:yScale}}=chart;
        const zeroY=Math.min(Math.max(yScale.getPixelForValue(0),chartArea.top),chartArea.bottom);
        const points=chart.getDatasetMeta(0).data;
        if(!points.length) return;
        ctx.save();
        ctx.beginPath(); ctx.rect(chartArea.left,chartArea.top,chartArea.width,chartArea.height); ctx.clip();
        function buildLinePath() {
          ctx.beginPath();
          for(let i=0;i<points.length;i++) { i===0?ctx.moveTo(points[i].x,points[i].y):ctx.lineTo(points[i].x,points[i].y); }
        }
        ctx.save(); ctx.beginPath(); ctx.rect(chartArea.left,chartArea.top,chartArea.width,zeroY-chartArea.top); ctx.clip();
        buildLinePath();
        ctx.lineTo(points[points.length-1].x,zeroY); ctx.lineTo(points[0].x,zeroY); ctx.closePath();
        const greenGrad=ctx.createLinearGradient(0,chartArea.top,0,zeroY);
        greenGrad.addColorStop(0,PAL.g(0.3)); greenGrad.addColorStop(1,PAL.g(0.02));
        ctx.fillStyle=greenGrad; ctx.fill(); ctx.restore();
        ctx.save(); ctx.beginPath(); ctx.rect(chartArea.left,zeroY,chartArea.width,chartArea.bottom-zeroY); ctx.clip();
        buildLinePath();
        ctx.lineTo(points[points.length-1].x,zeroY); ctx.lineTo(points[0].x,zeroY); ctx.closePath();
        const redGrad=ctx.createLinearGradient(0,zeroY,0,chartArea.bottom);
        redGrad.addColorStop(0,PAL.r(0.02)); redGrad.addColorStop(1,PAL.r(0.3));
        ctx.fillStyle=redGrad; ctx.fill(); ctx.restore();
        ctx.lineWidth=1; ctx.setLineDash([3,4]);
        ctx.strokeStyle=PAL.lineMuted;
        ctx.beginPath(); ctx.moveTo(chartArea.left,zeroY); ctx.lineTo(chartArea.right,zeroY); ctx.stroke();
        ctx.strokeStyle=PAL.lineMutedSoft;
        if (!window.matchMedia("(max-width: 768px)").matches) {
          monthBoundaries.forEach((b,i) => {
            if(i===0) return;
            const pt=points[b.index];
            if(!pt) return;
            ctx.beginPath(); ctx.moveTo(pt.x,chartArea.top); ctx.lineTo(pt.x,chartArea.bottom); ctx.stroke();
          });
        }
        if (maxDDUnits > 0 && maxDDPeakIdx < points.length && maxDDTroughIdx < points.length) {
          const _peakY = Math.min(Math.max(yScale.getPixelForValue(equityData[maxDDPeakIdx]), chartArea.top), chartArea.bottom);
          const _peakPt = points[maxDDPeakIdx];
          const _troughPt = points[maxDDTroughIdx];
          ctx.save();
          ctx.beginPath(); ctx.rect(chartArea.left, chartArea.top, chartArea.width, chartArea.height); ctx.clip();
          ctx.beginPath();
          ctx.moveTo(_peakPt.x, _peakY);
          ctx.lineTo(_troughPt.x, _peakY);
          ctx.lineTo(_troughPt.x, _troughPt.y);
          for (let _i = maxDDTroughIdx; _i >= maxDDPeakIdx; _i--) ctx.lineTo(points[_i].x, points[_i].y);
          ctx.closePath();
          ctx.fillStyle = PAL.r(0.13);
          ctx.fill();
          ctx.strokeStyle = PAL.r(0.7);
          ctx.lineWidth = 1;
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(_troughPt.x, _peakY);
          ctx.lineTo(_troughPt.x, _troughPt.y);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(_troughPt.x - 4, _peakY);
          ctx.lineTo(_troughPt.x + 4, _peakY);
          ctx.stroke();
          ctx.restore();
        }
        const athVal=athData[athData.length-1];
        if(athVal>0) {
          const athY=Math.round(Math.min(Math.max(yScale.getPixelForValue(athVal),chartArea.top),chartArea.bottom))+0.5;
          ctx.strokeStyle=PAL.o(0.5);
          ctx.beginPath(); ctx.moveTo(chartArea.left,athY); ctx.lineTo(chartArea.right,athY); ctx.stroke();
        }
        const currentVal=equityData[athData.length-1];
        if(currentVal!==undefined&&currentVal!==0) {
          const currentY=Math.round(Math.min(Math.max(yScale.getPixelForValue(currentVal),chartArea.top),chartArea.bottom))+0.5;
          ctx.strokeStyle=currentVal>=0?PAL.g(0.5):PAL.r(0.5);
          ctx.beginPath(); ctx.moveTo(chartArea.left,currentY); ctx.lineTo(chartArea.right,currentY); ctx.stroke();
        }
        ctx.setLineDash([]); ctx.restore();
      },
      afterDatasetsDraw(chart) {
        const {ctx,chartArea,scales:{y:yScale}}=chart;
        const points=chart.getDatasetMeta(0).data;
        if(points.length<2) return;
        const zeroY=Math.min(Math.max(yScale.getPixelForValue(0),chartArea.top),chartArea.bottom);
        ctx.save(); ctx.lineWidth=2.5; ctx.lineJoin="round"; ctx.lineCap="round";
        ctx.beginPath(); ctx.rect(chartArea.left,chartArea.top,chartArea.width,chartArea.height); ctx.clip();
        for(let i=1;i<points.length;i++) {
          const p0=points[i-1],p1=points[i];
          const y0=equityData[i-1],y1=equityData[i];
          if((y0>=0)===(y1>=0)) {
            ctx.strokeStyle=y0>=0?PAL.green:PAL.red;
            ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.stroke();
          } else {
            const t=Math.abs(y0)/(Math.abs(y0)+Math.abs(y1));
            const crossX=p0.x+t*(p1.x-p0.x);
            ctx.strokeStyle=y0>=0?PAL.green:PAL.red;
            ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(crossX,zeroY); ctx.stroke();
            ctx.strokeStyle=y1>=0?PAL.green:PAL.red;
            ctx.beginPath(); ctx.moveTo(crossX,zeroY); ctx.lineTo(p1.x,p1.y); ctx.stroke();
          }
        }
        ctx.restore();
      },
      afterDraw(chart) {
        const {ctx,chartArea}=chart;
        const points=chart.getDatasetMeta(0).data;
        if(!points.length) return;
        ctx.save();
        ctx.font="500 9px Inter"; ctx.textBaseline="top"; ctx.textAlign="left"; ctx.fillStyle=PAL.lineLabel;
        if (!window.matchMedia("(max-width: 768px)").matches) {
          monthBoundaries.forEach((b,i) => {
            if(i===0) return;
            const pt=points[b.index];
            if(!pt) return;
            const x=pt.x+3;
            const maxW=chartArea.right-x;
            if(maxW<10) return;
            ctx.save(); ctx.beginPath(); ctx.rect(x,chartArea.top,maxW,14); ctx.clip();
            ctx.fillText(b.label,x,chartArea.top+3); ctx.restore();
          });
        }
        ctx.font="600 11px Inter, system-ui, sans-serif"; ctx.textBaseline="bottom"; ctx.textAlign="right";
        ctx.fillStyle="rgba(130,130,130,0.14)";
        ctx.fillText("causticarrow.com", chartArea.right - 6, chartArea.bottom - 6);

        ctx.restore();
      }
    }]
  });

  requestAnimationFrame(()=>requestAnimationFrame(resizeSeq));
  requestAnimationFrame(()=>requestAnimationFrame(snapTableRows));
}

render();
document.fonts.ready.then(()=>{ if(chartInstance) chartInstance.update(); setTimeout(resizeSeq,50); setTimeout(snapTableRows,50); });
requestAnimationFrame(()=>requestAnimationFrame(snapTableRows));
window.addEventListener('resize', snapTableRows);
</script>
</body>
</html>
